name: "Setup octoscript shell"
description: |
  Installs `octoscript` as a shell command on the runner. After this
  step, any `run:` block with `shell: octoscript {0}` executes as a
  github-deno script with injected globals (github, context, core,
  git, Mustache, template, etc.).

  Use in composites where `defaults.run.shell` isn't available:
    shell: octoscript {0}

  Use in workflows via defaults:
    defaults:
      run:
        shell: octoscript {0}

inputs:
  deno-version:
    description: "Deno version to install."
    required: false
    default: "v2.x"

runs:
  using: composite
  steps:
    - uses: denoland/setup-deno@v2
      with:
        deno-version: ${{ inputs.deno-version }}

    - shell: bash
      run: |
        RUNNER_TS="${GITHUB_ACTION_PATH}/../github-deno/runner.ts"
        cat > /usr/local/bin/octoscript << SH
        #!/usr/bin/env bash
        exec deno run --allow-all "$RUNNER_TS" "\$@"
        SH
        chmod +x /usr/local/bin/octoscript
        echo "✓ octoscript installed → $(which octoscript)"
