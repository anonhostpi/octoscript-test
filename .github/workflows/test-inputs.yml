name: Test input isolation across composite layers
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup octoscript
        uses: sw2m/octoscript/action@main

      # Workflow-level: set INPUT_MSG directly via env
      - name: Workflow layer
        id: workflow
        env:
          INPUT_MSG: from-workflow
        run: |
          const val = inputs.get("msg");
          console.log(`workflow sees msg=${val}`);
          await output.set("result", val ?? "undefined");
        shell: octoscript {0}

      # Outer composite: gets msg="from-outer"
      - name: Outer layer
        id: outer
        uses: ./.github/actions/outer
        with:
          msg: "from-outer"

      # Verify all three saw different values
      - name: Verify isolation
        run: |
          echo "workflow: ${{ steps.workflow.outputs.result }}"
          echo "outer:    ${{ steps.outer.outputs.outer-result }}"
          echo "inner:    ${{ steps.outer.outputs.inner-result }}"

          test "${{ steps.workflow.outputs.result }}" = "from-workflow"
          test "${{ steps.outer.outputs.outer-result }}" = "from-outer"
          test "${{ steps.outer.outputs.inner-result }}" = "from-inner"

          echo "✓ All three layers saw their own msg value"
